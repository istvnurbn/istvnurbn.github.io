                <rect x="492.442" y="343.18" width="1183.54" height="170.325" style="fill:currentColor;"/>
            </g>
            <g transform="matrix(0.0245661,0,0,0.0245661,-11.7131,-25.6039)">
                <circle cx="1032.72" cy="1370.33" r="109.361" style="fill:currentColor;"/>
            </g>
            <g transform="matrix(0.0101229,-0.0101229,0.0111533,0.0111533,2.15759,18.5114)">
                <rect x="492.442" y="343.18" width="1183.54" height="170.325" style="fill:currentColor;"/>
            </g>
            <g transform="matrix(0.0245661,0,0,0.0245661,-3.20561,-17.0965)">
                <circle cx="1032.72" cy="1370.33" r="109.361" style="fill:currentColor;"/>
            </g>
        </svg>

  assets:
    disableHLJS: true
    disableFingerprinting: false
    favicon: "favicon.ico"
    favicon16x16: "favicon-16x16.png"
    favicon32x32: "favicon-32x32.png"
    apple_touch_icon: "apple-touch-icon.png"
    safari_pinned_tab: "safari-pinned-tab.svg"

  images: ["cover.png"]

  homeInfoParams:
    Title: "Hi there 👋🏻"
    Content: Welcome to the personal blog of István Urbán. Views and typos my own.

  socialIcons:
    - name: twitter
      url: "https://www.twitter.com/istvn_urbn"
    - name: github
      url: "https://www.github.com/istvnurbn"
  
  mainSections:
    - posts

  cover:
    hidden: false # hide everywhere but not in structured data
    hiddenInList: false # hide on list pages and home
    hiddenInSingle: true # hide on single page

  editPost:
    URL: "https://github.com/istvnurbn/istvnurbn.github.io/blob/main/content"
    Text: "suggest changes" # edit text
    appendFilePath: true # to append file path to Edit link

  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys: ["title", "permalink", "summary", "content"]

#Enabling Search
outputs:
    home:
        - HTML
        - RSS
        - JSON # is necessary

markup:
    highlight:
        style: dracula
        lineNos: false
        noClasses: false
        guessSyntax: true

menu:
  main:
    - identifier: posts
      name: "posts"
      url: /posts/
      weight: 10
    - identifier: tags
      name: "tags"
      url: /tags/
      weight: 20
    - identifier: about
      name: "about"
      url: /about/
      weight: 30