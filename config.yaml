baseURL: "https://istvnurbn.github.io/"
languageCode: en-us
title: "istvn.urbn"
theme: WonderMod
copyright: '© 2022-2023 István Urbán – [CC BY-SA 4.0](https://creativecommons.org/licenses/by-sa/4.0/)'
timeZone: "Europe/Budapest"

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false
enableGitInfo: true
enableEmoji: true
enableInlineShortcodes: true

paginate: 7
paginatePath: "page"

permalinks:
  posts: "/:year/:month/:title/"

minify:
  disableXML: true
  minifyOutput: true

params:
  env: production
  title: "istvn.urbn"
  description: "Personal & opinionated blog of István Urbán"
  keywords: [Blog, Geek, Self Hosting, FOSS, Privacy]
  author: István Urbán
  DateFormat: "January 2, 2006"
  defaultTheme: dark # dark, light
  disableThemeToggle: false

  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: false
  ShowCodeCopyButtons: true
  ShowFullTextinRSS: true
  disableSpecial1stPost: true
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: false
  showtoc: false

  label:
    iconHeight: 30
    iconSVG: |
        <svg height="30" viewBox="0 0 36 30" version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" xml:space="preserve" style="fill-rule:evenodd;clip-rule:evenodd;stroke-linejoin:round;stroke-miterlimit:2;">
